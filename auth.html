<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조직도 시스템 회원가입</title>

  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>조직도 시스템 회원가입</h1>
      <p class="desc">가입 신청 후 관리자 승인이 필요합니다.</p>

      <form id="signupForm">
        <div class="grid">
          <div class="field">
            <label for="employee_no">사번</label>
            <input type="text" id="employee_no" name="employee_no" required />
          </div>

          <div class="field">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" required />
          </div>

          <div class="field">
            <label for="birth_date">생년월일</label>
            <input type="date" id="birth_date" name="birth_date" required />
          </div>

          <div class="field">
            <label for="hire_date">입사일</label>
            <input type="date" id="hire_date" name="hire_date" required />
          </div>

          <div class="field">
            <label for="phone">핸드폰번호</label>
            <input type="text" id="phone" name="phone" placeholder="01012345678" required />
          </div>

          <div class="field">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="field full">
            <label for="address">주소</label>
            <input type="text" id="address" name="address" required />
          </div>

          <div class="field">
            <label for="requested_position_id">직급</label>
            <select id="requested_position_id" name="requested_position_id" required>
              <option value="">직급을 먼저 선택하세요</option>
            </select>
          </div>

          <div class="field">
            <label for="requested_manager_id">담당</label>
            <select id="requested_manager_id" name="requested_manager_id" required disabled>
              <option value="">직급을 먼저 선택하세요</option>
            </select>
          </div>

          <div class="field">
            <label for="requested_team_leader_id">팀장</label>
            <select id="requested_team_leader_id" name="requested_team_leader_id" required disabled>
              <option value="">직급을 먼저 선택하세요</option>
            </select>
          </div>

          <div class="field">
            <label for="requested_store_id">매장</label>
            <select id="requested_store_id" name="requested_store_id" required disabled>
              <option value="">팀장을 먼저 선택하세요</option>
            </select>
          </div>

          <div class="field">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" minlength="8" required />
            <div class="row-note">8자 이상 입력</div>
          </div>

          <div class="field">
            <label for="password_confirm">비밀번호 확인</label>
            <input type="password" id="password_confirm" name="password_confirm" minlength="8" required />
          </div>

          <div class="field full">
            <button type="submit" class="submit-btn" id="submitBtn">가입 신청하기</button>
          </div>
        </div>
      </form>

      <div id="messageBox" class="msg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script>
    const supabaseClient = window.createSupabaseClient();

    const signupForm = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('messageBox');

    const storeSelect = document.getElementById('requested_store_id');
    const managerSelect = document.getElementById('requested_manager_id');
    const teamLeaderSelect = document.getElementById('requested_team_leader_id');
    const positionSelect = document.getElementById('requested_position_id');

    let allStores = [];
    let allTeamLeaders = [];
    let teamLeaderIdsByManager = new Map();
    let storeIdsByTeamLeader = new Map();

    function showMessage(type, text) {
      messageBox.className = `msg ${type}`;
      messageBox.textContent = text;
      messageBox.style.display = type ? 'block' : 'none';
    }

    function normalizePhone(phone) {
      return String(phone || '').replace(/[^0-9]/g, '');
    }

    function toNullableNumber(value) {
      if (value === null || value === undefined || value === '') return null;
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function appendOptions(selectEl, list, labelKey) {
      list.forEach(item => {
        const option = document.createElement('option');
        option.value = item.id;
        option.textContent = item[labelKey];
        selectEl.appendChild(option);
      });
    }

    function clearSelectOptions(selectEl, placeholder = '선택') {
      selectEl.innerHTML = '';
      const option = document.createElement('option');
      option.value = '';
      option.textContent = placeholder;
      selectEl.appendChild(option);
    }

    function appendMappedOptions(selectEl, options, labelKey) {
      options.forEach((item) => {
        const option = document.createElement('option');
        option.value = String(item.id);
        option.textContent = item[labelKey];
        selectEl.appendChild(option);
      });
    }

    function normalizeRoleName(roleName) {
      return String(roleName || '').replace(/\s+/g, '').toLowerCase();
    }

    function getSelectedRoleName() {
      const selectedOption = positionSelect.options[positionSelect.selectedIndex];
      return selectedOption ? selectedOption.textContent.trim() : '';
    }

    function isHierarchyRequiredRole(roleName) {
      const normalized = normalizeRoleName(roleName);
      return normalized.includes('점장') || normalized.includes('플래너') || normalized === 'sp' || normalized.includes('(sp)') || normalized.includes('sp');
    }

    function isHierarchyDisabledRole(roleName) {
      const normalized = normalizeRoleName(roleName);
      return normalized.includes('담당') || normalized.includes('팀장');
    }

    function buildHierarchyMap(teamLeaders, stores) {
      teamLeaderIdsByManager = new Map();
      storeIdsByTeamLeader = new Map();

      (teamLeaders || []).forEach((leader) => {
        const groupId = leader.group_id;
        if (!groupId || !leader.id) return;
        if (!teamLeaderIdsByManager.has(groupId)) {
          teamLeaderIdsByManager.set(groupId, new Set());
        }
        teamLeaderIdsByManager.get(groupId).add(leader.id);
      });

      const leaderNoById = new Map((teamLeaders || []).map((leader) => [leader.id, leader.employee_no]));

      (stores || []).forEach((store) => {
        const leaderEmployeeNo = store.team_leader_employee_no;
        if (!leaderEmployeeNo || !store.id) return;

        (teamLeaders || []).forEach((leader) => {
          if (!leader.id) return;
          if (leaderNoById.get(leader.id) === leaderEmployeeNo) {
            if (!storeIdsByTeamLeader.has(leader.id)) {
              storeIdsByTeamLeader.set(leader.id, new Set());
            }
            storeIdsByTeamLeader.get(leader.id).add(store.id);
          }
        });
      });
    }

    function getFilteredTeamLeaders(managerId) {
      if (!managerId) return [];
      const allowed = teamLeaderIdsByManager.get(Number(managerId));
      if (!allowed) return [];
      return allTeamLeaders.filter((item) => allowed.has(item.id));
    }

    function getFilteredStores(teamLeaderId) {
      if (!teamLeaderId) return [];
      const allowed = storeIdsByTeamLeader.get(Number(teamLeaderId));
      if (!allowed) return [];
      return allStores.filter((item) => allowed.has(item.id));
    }

    function resetDependentFields(fromField) {
      if (fromField === 'role') {
        managerSelect.value = '';
        teamLeaderSelect.value = '';
        storeSelect.value = '';
      }

      if (fromField === 'manager') {
        teamLeaderSelect.value = '';
        storeSelect.value = '';
      }

      if (fromField === 'teamLeader') {
        storeSelect.value = '';
      }
    }

    function refreshTeamLeaderOptions({ preserveValue = false } = {}) {
      const prevValue = preserveValue ? teamLeaderSelect.value : '';
      const managerId = managerSelect.value;

      if (!managerId) {
        clearSelectOptions(teamLeaderSelect, '담당을 먼저 선택하세요');
        teamLeaderSelect.value = '';
        return;
      }

      const filtered = getFilteredTeamLeaders(managerId);
      clearSelectOptions(teamLeaderSelect, filtered.length ? '선택' : '선택 가능한 팀장 없음');
      appendMappedOptions(teamLeaderSelect, filtered, 'team_leader_name');

      if (preserveValue && filtered.some((item) => String(item.id) === String(prevValue))) {
        teamLeaderSelect.value = prevValue;
      } else {
        teamLeaderSelect.value = '';
      }
    }

    function refreshStoreOptions({ preserveValue = false } = {}) {
      const prevValue = preserveValue ? storeSelect.value : '';
      const teamLeaderId = teamLeaderSelect.value;

      if (!teamLeaderId) {
        clearSelectOptions(storeSelect, '팀장을 먼저 선택하세요');
        storeSelect.value = '';
        return;
      }

      const filtered = getFilteredStores(teamLeaderId);
      clearSelectOptions(storeSelect, filtered.length ? '선택' : '선택 가능한 매장 없음');
      appendMappedOptions(storeSelect, filtered, 'store_name');

      if (preserveValue && filtered.some((item) => String(item.id) === String(prevValue))) {
        storeSelect.value = prevValue;
      } else {
        storeSelect.value = '';
      }
    }

    function applyRoleBasedFieldState() {
      const roleName = getSelectedRoleName();
      const roleSelected = Boolean(positionSelect.value);

      if (!roleSelected) {
        managerSelect.disabled = true;
        teamLeaderSelect.disabled = true;
        storeSelect.disabled = true;
        clearSelectOptions(managerSelect, '직급을 먼저 선택하세요');
        clearSelectOptions(teamLeaderSelect, '직급을 먼저 선택하세요');
        clearSelectOptions(storeSelect, '팀장을 먼저 선택하세요');
        resetDependentFields('role');
        return;
      }

      managerSelect.disabled = false;
      clearSelectOptions(managerSelect, '선택');
      appendMappedOptions(managerSelect, Array.from(managerSelect.dataset.rawManagers ? JSON.parse(managerSelect.dataset.rawManagers) : []), 'group_name');

      if (isHierarchyDisabledRole(roleName)) {
        teamLeaderSelect.disabled = true;
        storeSelect.disabled = true;
        clearSelectOptions(teamLeaderSelect, '팀장 선택 불필요');
        clearSelectOptions(storeSelect, '매장 선택 불필요');
        resetDependentFields('manager');
        return;
      }

      teamLeaderSelect.disabled = !managerSelect.value;
      storeSelect.disabled = true;

      if (!managerSelect.value) {
        clearSelectOptions(teamLeaderSelect, '담당을 먼저 선택하세요');
        clearSelectOptions(storeSelect, '팀장을 먼저 선택하세요');
        resetDependentFields('manager');
        return;
      }

      refreshTeamLeaderOptions();
      teamLeaderSelect.disabled = false;

      if (!teamLeaderSelect.value) {
        clearSelectOptions(storeSelect, '팀장을 먼저 선택하세요');
        storeSelect.disabled = true;
        return;
      }

      refreshStoreOptions();
      storeSelect.disabled = false;
    }

    function bindHierarchyEvents() {
      positionSelect.addEventListener('change', () => {
        resetDependentFields('role');
        applyRoleBasedFieldState();
      });

      managerSelect.addEventListener('change', () => {
        resetDependentFields('manager');

        const roleName = getSelectedRoleName();
        if (isHierarchyDisabledRole(roleName)) {
          clearSelectOptions(teamLeaderSelect, '팀장 선택 불필요');
          clearSelectOptions(storeSelect, '매장 선택 불필요');
          teamLeaderSelect.disabled = true;
          storeSelect.disabled = true;
          return;
        }

        refreshTeamLeaderOptions();
        teamLeaderSelect.disabled = false;

        clearSelectOptions(storeSelect, '팀장을 먼저 선택하세요');
        storeSelect.disabled = true;
      });

      teamLeaderSelect.addEventListener('change', () => {
        resetDependentFields('teamLeader');

        if (!teamLeaderSelect.value) {
          clearSelectOptions(storeSelect, '팀장을 먼저 선택하세요');
          storeSelect.disabled = true;
          return;
        }

        refreshStoreOptions();
        storeSelect.disabled = false;
      });
    }

    async function loadSelectOptions() {
      const [storesRes, managersRes, teamLeadersRes, positionsRes] = await Promise.all([
        supabaseClient.from('au_stores').select('id, store_name, team_leader_employee_no, group_id').eq('is_active', true).order('store_name', { ascending: true }),
        supabaseClient.from('au_groups').select('id, group_name').eq('is_active', true).order('group_name', { ascending: true }),
        supabaseClient.from('au_team_leaders').select('id, team_leader_name, employee_no, group_id').eq('is_active', true).order('team_leader_name', { ascending: true }),
        supabaseClient.from('au_positions').select('id, position_name').eq('is_active', true).order('sort_order', { ascending: true })
      ]);

      if (storesRes.error) throw new Error(`매장 불러오기 실패: ${storesRes.error.message}`);
      if (managersRes.error) throw new Error(`담당 불러오기 실패: ${managersRes.error.message}`);
      if (teamLeadersRes.error) throw new Error(`팀장 불러오기 실패: ${teamLeadersRes.error.message}`);
      if (positionsRes.error) throw new Error(`직급 불러오기 실패: ${positionsRes.error.message}`);
      
      allStores = storesRes.data || [];
      allTeamLeaders = teamLeadersRes.data || [];

      appendOptions(positionSelect, positionsRes.data || [], 'position_name');

      clearSelectOptions(managerSelect, '직급을 먼저 선택하세요');
      const rawManagers = managersRes.data || [];
      managerSelect.dataset.rawManagers = JSON.stringify(rawManagers);

      clearSelectOptions(teamLeaderSelect, '직급을 먼저 선택하세요');
      clearSelectOptions(storeSelect, '팀장을 먼저 선택하세요');

      buildHierarchyMap(teamLeadersRes.data || [], storesRes.data || []);
    }

    async function createSignupRequest(formData, authUserId) {
      const payload = {
        auth_user_id: authUserId,
        employee_no: formData.employee_no.trim(),
        name: formData.name.trim(),
        birth_date: formData.birth_date,
        phone: normalizePhone(formData.phone),
        email: formData.email.trim().toLowerCase(),
        address: formData.address.trim(),
        hire_date: formData.hire_date,
        requested_store_id: toNullableNumber(formData.requested_store_id),
        requested_manager_id: toNullableNumber(formData.requested_manager_id),
        requested_team_leader_id: toNullableNumber(formData.requested_team_leader_id),
        requested_position_id: toNullableNumber(formData.requested_position_id),
        request_status: 'pending'
      };

      const { error } = await supabaseClient.from('au_signup_requests').insert(payload);
      if (error) {
        console.error('signup request error:', error);
        throw new Error(error.message);
      }
    }

    async function signUpAuth(email, password) {
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) throw new Error(error.message);
      if (!data?.user?.id) throw new Error('회원가입 처리 중 auth user 생성에 실패.');
      return data.user.id;
    }

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      showMessage('', '');

      const formData = Object.fromEntries(new FormData(signupForm).entries());
      formData.requested_manager_id = managerSelect.value;
      formData.requested_team_leader_id = teamLeaderSelect.value;
      formData.requested_store_id = storeSelect.value;

      if (formData.password !== formData.password_confirm) {
        showMessage('error', '비밀번호 확인 불일치.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '처리 중...';

      try {
        const authUserId = await signUpAuth(formData.email.trim().toLowerCase(), formData.password);
        await createSignupRequest(formData, authUserId);

        signupForm.reset();
        applyRoleBasedFieldState();
        showMessage('success', '가입 신청 완료.');
      } catch (error) {
        console.error('signup process error:', error);
        showMessage('error', error.message || '가입 신청 중 오류가 발생.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '가입 신청하기';
      }
    });

    (async function init() {
      try {
        await loadSelectOptions();
        bindHierarchyEvents();
        applyRoleBasedFieldState();
      } catch (error) {
        console.error('init error:', error);
        showMessage('error', `초기 데이터 로딩 실패: ${error.message}`);
      }
    })();
  </script>
</body>
</html>
