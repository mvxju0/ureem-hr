<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조직도 시스템 회원가입</title>
  
  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />

</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>조직도 시스템 회원가입</h1>
      <p class="desc">
        가입 신청 후 관리자 승인이 필요합니다.
      </p>

      <form id="signupForm">
        <div class="grid">
          <div class="field">
            <label for="employee_no">사번</label>
            <input type="text" id="employee_no" name="employee_no" required />
          </div>

          <div class="field">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" required />
          </div>

          <div class="field">
            <label for="birth_date">생년월일</label>
            <input type="date" id="birth_date" name="birth_date" required />
          </div>

          <div class="field">
            <label for="hire_date">입사일</label>
            <input type="date" id="hire_date" name="hire_date" required />
          </div>

          <div class="field">
            <label for="phone">핸드폰번호</label>
            <input type="text" id="phone" name="phone" placeholder="01012345678" required />
          </div>

          <div class="field">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="field full">
            <label for="address">주소</label>
            <input type="text" id="address" name="address" required />
          </div>

          <div class="field">
            <label for="requested_store_id">매장</label>
            <select id="requested_store_id" name="requested_store_id" required>
              <option value="">선택</option>
            </select>
          </div>

          <div class="field">
            <label for="requested_manager_id">담당</label>
            <select id="requested_manager_id" name="requested_manager_id" required>
              <option value="">선택</option>
            </select>
          </div>

          <div class="field">
            <label for="requested_team_leader_id">팀장</label>
            <select id="requested_team_leader_id" name="requested_team_leader_id" required>
              <option value="">선택</option>
            </select>
          </div>

          <div class="field">
            <label for="requested_position_id">직급</label>
            <select id="requested_position_id" name="requested_position_id" required>
              <option value="">선택</option>
            </select>
          </div>

          <div class="field">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" minlength="8" required />
            <div class="row-note">8자 이상 입력</div>
          </div>

          <div class="field">
            <label for="password_confirm">비밀번호 확인</label>
            <input type="password" id="password_confirm" name="password_confirm" minlength="8" required />
          </div>

          <div class="field full">
            <button type="submit" class="submit-btn" id="submitBtn">가입 신청하기</button>
          </div>
        </div>
      </form>

      <div id="messageBox" class="msg"></div>
    </div>
  </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/signup.js"></script>
</body>
</html>
