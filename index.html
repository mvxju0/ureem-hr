<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사내 로그인</title>
  
  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />

</head>
<body>
  <div class="login-wrap">
    <div class="title-area">
      <h1>사내 조직도 시스템</h1>
      <p>유림텔레콤</p>
    </div>

    <div class="field">
      <label for="employeeNoInput">사번</label>
      <input type="text" id="employeeNoInput" placeholder="사번 입력" autocomplete="username" />
    </div>

    <div class="field">
      <label for="passwordInput">비밀번호</label>
      <input type="password" id="passwordInput" placeholder="비밀번호 입력" autocomplete="current-password" />
    </div>

    <div class="actions">
      <button type="button" class="btn btn-login" id="loginBtn">로그인</button>
      <button type="button" class="btn btn-signup" id="signupBtn">회원가입</button>
    </div>

    <div class="helper">
      회원가입 이후 관리자의 승인이 필요합니다
    </div>

    <div class="loading-text" id="loadingText">처리 중...</div>
    <div class="message" id="messageBox"></div>
  </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
