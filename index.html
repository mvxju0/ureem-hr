<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사내 로그인</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 440px;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.10);
      border: 1px solid #edf0f5;
    }

    .title-area {
      margin-bottom: 24px;
      text-align: center;
    }

    .title-area h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .title-area p {
      margin: 8px 0 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #4b5563;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      height: 48px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }

    .field input:focus {
      border-color: #111827;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      height: 48px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-login {
      background: #111827;
      color: #fff;
    }

    .btn-signup {
      background: #e6007e;
      color: #fff;
    }

    .helper {
      margin-top: 14px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      line-height: 1.5;
    }

    .message {
      margin-top: 16px;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
      white-space: pre-line;
    }

    .message.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .message.success {
      display: block;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    .loading-text {
      margin-top: 12px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      display: none;
    }

    @media (max-width: 480px) {
      .login-wrap {
        padding: 24px 18px;
        border-radius: 20px;
      }

      .title-area h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="title-area">
      <h1>사내 조직도 시스템</h1>
      <p>유림텔레콤</p>
    </div>

    <div class="field">
      <label for="employeeNoInput">사번</label>
      <input type="text" id="employeeNoInput" placeholder="사번 입력" autocomplete="username" />
    </div>

    <div class="field">
      <label for="passwordInput">비밀번호</label>
      <input type="password" id="passwordInput" placeholder="비밀번호 입력" autocomplete="current-password" />
    </div>

    <div class="actions">
      <button type="button" class="btn btn-login" id="loginBtn">로그인</button>
      <button type="button" class="btn btn-signup" id="signupBtn">회원가입</button>
    </div>

    <div class="helper">
      회원가입 이후 관리자의 승인이 필요합니다
    </div>

    <div class="loading-text" id="loadingText">처리 중...</div>
    <div class="message" id="messageBox"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ytnxmnbctujuopbqpurl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_4oBm89ecivuVF6StOBz7yg_qNBItC4z';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const employeeNoInput = document.getElementById("employeeNoInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");
    const loadingText = document.getElementById("loadingText");
    const messageBox = document.getElementById("messageBox");

    function setLoading(isLoading) {
      loadingText.style.display = isLoading ? "block" : "none";
      loginBtn.disabled = isLoading;
      signupBtn.disabled = isLoading;
      employeeNoInput.disabled = isLoading;
      passwordInput.disabled = isLoading;
    }

    function showMessage(message, type = "error") {
      messageBox.className = `message ${type}`;
      messageBox.textContent = message;
    }

    function clearMessage() {
      messageBox.className = "message";
      messageBox.textContent = "";
    }

    async function checkAlreadyLoggedIn() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (!error && data?.user) {
        location.href = "front.html";
      }
    }

    async function getLoginAccountByEmployeeNo(employeeNo) {
      const { data, error } = await supabaseClient.rpc("au_get_login_account_by_employee_no", {
        p_employee_no: employeeNo
      });

      if (error) {
        console.error("로그인 계정 조회 RPC 오류:", error);
        throw new Error(`사번 조회에 실패했어. 상세 오류: ${error.message}`);
      }

      if (!data || !data.length) {
        throw new Error("해당 사번으로 로그인 가능한 계정이 없습니다");
      }

      return data[0];
    }

    async function login() {
      clearMessage();

      const employeeNo = employeeNoInput.value.trim();
      const password = passwordInput.value.trim();

      if (!employeeNo) {
        showMessage("사번을 입력해주세요");
        employeeNoInput.focus();
        return;
      }

      if (!password) {
        showMessage("비밀번호를 입력해주세요");
        passwordInput.focus();
        return;
      }

      try {
        setLoading(true);

        const account = await getLoginAccountByEmployeeNo(employeeNo);

        const loginEmail = account.login_email;
        const signupApproved = account.signup_approved;
        const accountStatus = String(account.account_status || "").toLowerCase();

        if (!loginEmail) {
          throw new Error("로그인 이메일 정보가 없습니다. 관리자 문의.");
        }

        if (signupApproved !== true) {
          throw new Error("아직 승인되지 않은 계정입니다");
        }

        if (accountStatus === "disabled") {
          throw new Error("비활성화된 계정입니다. 관리자 문의.");
        }

        if (accountStatus === "locked") {
          throw new Error("잠긴 계정입니다. 관리자 문의.");
        }

        const { error: signInError } = await supabaseClient.auth.signInWithPassword({
          email: loginEmail,
          password: password
        });

        if (signInError) {
          console.error("로그인 오류:", signInError);

          if (
            signInError.message?.toLowerCase().includes("invalid login credentials") ||
            signInError.message?.toLowerCase().includes("invalid credentials")
          ) {
            throw new Error("비밀번호가 맞지 않거나 로그인 정보가 올바르지 않아.");
          }

          throw new Error(`로그인에 실패했어. 상세 오류: ${signInError.message}`);
        }

        showMessage("로그인 성공. 이동 중...", "success");
        location.href = "front.html";
      } catch (err) {
        console.error(err);
        showMessage(err.message || "로그인 중 오류가 발생했어.");
      } finally {
        setLoading(false);
      }
    }

    loginBtn.addEventListener("click", login);

    signupBtn.addEventListener("click", () => {
      location.href = "auth.html";
    });

    employeeNoInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        login();
      }
    });

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        login();
      }
    });

    checkAlreadyLoggedIn();
  </script>
</body>
</html>
