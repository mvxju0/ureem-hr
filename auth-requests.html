<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가입 승인 관리</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; background: #f4f6fb; color: #111; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px 14px 110px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .title { font-size: 28px; font-weight: 800; margin: 0; }
    .sub { margin: 6px 0 0; font-size: 14px; color: #666; }
    .btn { border:0; border-radius:12px; padding:11px 14px; min-height:42px; font-size:14px; font-weight:700; cursor:pointer; }
    .btn-dark { background:#111827; color:#fff; }
    .btn-gray { background:#e5e7eb; color:#111; }
    .btn-red { background:#dc2626; color:#fff; }
    .btn-blue { background:#2563eb; color:#fff; }
    .layout { display:grid; grid-template-columns:1.2fr .8fr; gap:12px; }
    .card { background:#fff; border-radius:16px; box-shadow:0 8px 24px rgba(0,0,0,.06); overflow:hidden; }
    .card-head { padding:16px 18px; border-bottom:1px solid #edf0f5; font-size:16px; font-weight:700; }
    .card-body { padding:16px 18px; }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:860px; }
    th,td { text-align:left; padding:12px 10px; border-bottom:1px solid #edf0f5; font-size:14px; vertical-align:middle; }
    th { background:#fafbfc; font-weight:700; color:#333; }
    tr.active-row { background:#f8fbff; }
    .empty { padding:26px 12px; text-align:center; color:#777; font-size:14px; }
    .detail-grid { display:grid; grid-template-columns:120px 1fr; gap:12px 14px; font-size:14px; }
    .label { color:#666; font-weight:700; }
    .value { color:#111; word-break:break-all; }
    .detail-actions { display:grid; gap:10px; margin-top:16px; }
    textarea { width:100%; min-height:100px; border:1px solid #d7deea; border-radius:10px; padding:12px; font-size:14px; resize:vertical; }
    .msg { margin-bottom:12px; padding:12px 14px; border-radius:10px; font-size:14px; display:none; }
    .msg.success { display:block; background:#ecfdf3; border:1px solid #bbf7d0; color:#166534; }
    .msg.error { display:block; background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }
    .badge { display:inline-block; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; background:#fff7ed; color:#9a3412; }
    .row-btn { padding:8px 10px; border-radius:8px; font-size:13px; border:0; background:#eef2ff; color:#3730a3; cursor:pointer; font-weight:700; }
    .blocked { background:#fff; border:1px solid #eaecf0; border-radius:16px; padding:20px; text-align:center; color:#666; }
    .hidden { display:none !important; }

    .bottom-nav { position:fixed; left:0; right:0; bottom:0; z-index:50; background:#fff; border-top:1px solid #e4e7ec; display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:6px; padding:8px 6px calc(8px + env(safe-area-inset-bottom)); }
    .nav-item { border-radius:12px; min-height:52px; text-decoration:none; color:#667085; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:11px; font-weight:700; }
    .nav-item.active { background:#111827; color:#fff; }
    .nav-item .icon { font-size:16px; line-height:1; }

    @media (max-width:980px) { .layout { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 class="title">가입 승인 관리</h1>
        <p class="sub">신청건 선택 후 승인/거절 RPC를 실행한다.</p>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-gray" id="refreshBtn">새로고침</button>
        <button class="btn btn-dark" id="gofrontBtn">홈으로</button>
      </div>
    </div>

    <div id="messageBox" class="msg"></div>
    <div id="blockedBox" class="blocked hidden">관리자 전용 페이지야.</div>

    <div id="appRoot" class="layout">
      <div class="card">
        <div class="card-head">대기중인 가입 신청</div>
        <div class="card-body">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>신청일</th><th>사번</th><th>이름</th><th>이메일</th><th>연락처</th><th>매장</th><th>직급</th><th>상태</th><th>선택</th>
                </tr>
              </thead>
              <tbody id="requestTableBody"><tr><td colspan="9" class="empty">불러오는 중...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">신청 상세</div>
        <div class="card-body">
          <div id="detailEmpty" class="empty">목록에서 신청건을 선택해.</div>
          <div id="detailBox" style="display:none;">
            <div class="detail-grid">
              <div class="label">신청 ID</div><div class="value" id="d_id">-</div>
              <div class="label">사번</div><div class="value" id="d_employee_no">-</div>
              <div class="label">이름</div><div class="value" id="d_name">-</div>
              <div class="label">연락처</div><div class="value" id="d_phone">-</div>
              <div class="label">이메일</div><div class="value" id="d_email">-</div>
              <div class="label">매장</div><div class="value" id="d_store">-</div>
              <div class="label">담당</div><div class="value" id="d_manager">-</div>
              <div class="label">팀장</div><div class="value" id="d_team_leader">-</div>
              <div class="label">직급</div><div class="value" id="d_position">-</div>
              <div class="label">상태</div><div class="value" id="d_status">-</div>
              <div class="label">신청일</div><div class="value" id="d_created_at">-</div>
            </div>

            <div class="detail-actions">
              <button class="btn btn-blue" id="approveBtn">승인</button>
              <textarea id="rejectReason" placeholder="거절 사유 입력"></textarea>
              <button class="btn btn-red" id="rejectBtn">거절</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="하단 네비게이션">
    <a class="nav-item" href="front.html"><span class="icon">🏠</span><span>대시보드</span></a>
    <a class="nav-item hidden" data-admin-only="true" href="employees.html"><span class="icon">👥</span><span>직원</span></a>
    <a class="nav-item hidden" data-admin-only="true" href="store-edit.html"><span class="icon">🏬</span><span>매장</span></a>
    <a class="nav-item" href="attendance.html"><span class="icon">🕒</span><span>근태</span></a>
    <a class="nav-item" href="payroll.html"><span class="icon">💳</span><span>급여</span></a>
  </nav>

  <script>
    const SUPABASE_URL = 'https://ytnxmnbctujuopbqpurl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_4oBm89ecivuVF6StOBz7yg_qNBItC4z';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const messageBox = document.getElementById('messageBox');
    const appRoot = document.getElementById('appRoot');
    const blockedBox = document.getElementById('blockedBox');
    const requestTableBody = document.getElementById('requestTableBody');
    const detailEmpty = document.getElementById('detailEmpty');
    const detailBox = document.getElementById('detailBox');
    const rejectReasonEl = document.getElementById('rejectReason');
    const approveBtn = document.getElementById('approveBtn');
    const rejectBtn = document.getElementById('rejectBtn');

    let selectedRequest = null;
    let currentAdminEmployeeNo = null;
    let currentRole = 'viewer';
    let requestRows = [];

    function showMessage(type, text) {
      messageBox.className = `msg ${type}`;
      messageBox.textContent = text;
    }
    function clearMessage() {
      messageBox.className = 'msg';
      messageBox.textContent = '';
      messageBox.style.display = 'none';
    }
    function safeText(value) { return value ?? '-'; }
    function formatDateTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    function normalizeAccountStatus(status) { return String(status || '').toLowerCase().trim(); }

    function setAdminNavVisibility(roleName) {
      document.querySelectorAll('[data-admin-only="true"]').forEach((el) => {
        el.classList.toggle('hidden', roleName !== 'admin');
      });
    }

    async function ensureAdmin() {
      const { data: userData, error: userError } = await supabaseClient.auth.getUser();
      if (userError || !userData?.user) {
        location.replace('index.html');
        return;
      }

      const user = userData.user;

      const { data: account, error: accountError } = await supabaseClient
        .from('au_employee_accounts')
        .select('employee_no, signup_approved, account_status')
        .eq('auth_user_id', user.id)
        .maybeSingle();

      if (accountError) {
        console.error('au_employee_accounts 조회 오류:', accountError);
        throw new Error(`계정 정보를 불러오지 못했어. 상세 오류: ${accountError.message}`);
      }
      if (!account) throw new Error('로그인 계정의 직원 연결 정보가 없어.');
      if (!account.signup_approved) throw new Error('승인되지 않은 계정이야.');

      const accountStatus = normalizeAccountStatus(account.account_status);
      if (accountStatus === 'disabled') throw new Error('비활성 계정이야.');
      if (accountStatus === 'locked') throw new Error('잠긴 계정이야.');

      const { data: employeeData, error: employeeError } = await supabaseClient
        .from('au_employees')
        .select('employee_no, system_role_id')
        .eq('employee_no', account.employee_no)
        .maybeSingle();

      if (employeeError) {
        console.error('au_employees 조회 오류:', employeeError);
        throw new Error(`직원 정보를 불러오지 못했어. 상세 오류: ${employeeError.message}`);
      }

      const roleId = employeeData?.system_role_id;
      const { data: roleData, error: roleError } = await supabaseClient
        .from('au_system_roles')
        .select('id, role_name')
        .eq('id', roleId)
        .maybeSingle();

      if (roleError) {
        console.error('au_system_roles 조회 오류:', roleError);
        throw new Error(`권한 정보를 불러오지 못했어. 상세 오류: ${roleError.message}`);
      }

      currentRole = String(roleData?.role_name || 'viewer').toLowerCase();
      currentAdminEmployeeNo = account.employee_no;
      setAdminNavVisibility(currentRole);

      if (currentRole !== 'admin') {
        appRoot.classList.add('hidden');
        blockedBox.classList.remove('hidden');
      }
    }

    async function loadPendingRequests() {
      clearMessage();
      const { data, error } = await supabaseClient
        .from('au_signup_requests')
        .select(`
          id, employee_no, name, birth_date, phone, email, address, hire_date,
          request_status, created_at,
          requested_store_id, requested_manager_id, requested_team_leader_id, requested_position_id,
          au_stores:requested_store_id ( id, store_name ),
          au_managers:requested_manager_id ( id, manager_name ),
          au_team_leaders:requested_team_leader_id ( id, team_leader_name ),
          au_positions:requested_position_id ( id, position_name )
        `)
        .eq('request_status', 'pending')
        .order('created_at', { ascending: true });

      if (error) {
        console.error('au_signup_requests 조회 오류:', error);
        throw new Error(`신청 목록 조회에 실패했어. 상세 오류: ${error.message}`);
      }

      requestRows = data || [];
      renderRequestTable();
    }

    function renderRequestTable() {
      if (!requestRows.length) {
        requestTableBody.innerHTML = `<tr><td colspan="9" class="empty">대기중인 신청이 없어.</td></tr>`;
        selectedRequest = null;
        detailBox.style.display = 'none';
        detailEmpty.style.display = 'block';
        return;
      }

      requestTableBody.innerHTML = requestRows.map((row) => {
        const isActive = selectedRequest && selectedRequest.id === row.id;
        return `
          <tr class="${isActive ? 'active-row' : ''}">
            <td>${formatDateTime(row.created_at)}</td>
            <td>${safeText(row.employee_no)}</td>
            <td>${safeText(row.name)}</td>
            <td>${safeText(row.email)}</td>
            <td>${safeText(row.phone)}</td>
            <td>${safeText(row.au_stores?.store_name)}</td>
            <td>${safeText(row.au_positions?.position_name)}</td>
            <td><span class="badge">${safeText(row.request_status)}</span></td>
            <td><button class="row-btn" type="button" onclick="window.selectRequest(${row.id})">선택</button></td>
          </tr>
        `;
      }).join('');
    }

    function fillDetail(row) {
      document.getElementById('d_id').textContent = safeText(row.id);
      document.getElementById('d_employee_no').textContent = safeText(row.employee_no);
      document.getElementById('d_name').textContent = safeText(row.name);
      document.getElementById('d_phone').textContent = safeText(row.phone);
      document.getElementById('d_email').textContent = safeText(row.email);
      document.getElementById('d_store').textContent = safeText(row.au_stores?.store_name);
      document.getElementById('d_manager').textContent = safeText(row.au_managers?.manager_name);
      document.getElementById('d_team_leader').textContent = safeText(row.au_team_leaders?.team_leader_name);
      document.getElementById('d_position').textContent = safeText(row.au_positions?.position_name);
      document.getElementById('d_status').textContent = safeText(row.request_status);
      document.getElementById('d_created_at').textContent = formatDateTime(row.created_at);
    }

    window.selectRequest = function(requestId) {
      const found = requestRows.find((item) => item.id === requestId);
      if (!found) return;
      selectedRequest = found;
      fillDetail(found);
      detailEmpty.style.display = 'none';
      detailBox.style.display = 'block';
      renderRequestTable();
    };

    async function approveSelectedRequest() {
      if (!selectedRequest) return showMessage('error', '선택된 신청건이 없어.');
      if (!currentAdminEmployeeNo) return showMessage('error', '관리자 사번을 읽지 못했어. 다시 로그인해줘.');

      const ok = confirm(`사번 ${selectedRequest.employee_no || '-'} / ${selectedRequest.name || '-'} 신청을 승인할까?`);
      if (!ok) return;

      const { error } = await supabaseClient.rpc('au_approve_signup_request', {
        p_request_id: selectedRequest.id,
        p_reviewed_by_employee_no: currentAdminEmployeeNo
      });

      if (error) {
        console.error('au_approve_signup_request 오류:', error);
        throw new Error(`승인 처리 실패: ${error.message}`);
      }

      showMessage('success', '승인 처리 완료.');
      selectedRequest = null;
      rejectReasonEl.value = '';
      detailBox.style.display = 'none';
      detailEmpty.style.display = 'block';
      await loadPendingRequests();
    }

    async function rejectSelectedRequest() {
      if (!selectedRequest) return showMessage('error', '선택된 신청건이 없어.');
      if (!currentAdminEmployeeNo) return showMessage('error', '관리자 사번을 읽지 못했어. 다시 로그인해줘.');

      const reason = rejectReasonEl.value.trim();
      if (!reason) return showMessage('error', '거절 사유를 입력해.');

      const ok = confirm(`사번 ${selectedRequest.employee_no || '-'} / ${selectedRequest.name || '-'} 신청을 거절할까?`);
      if (!ok) return;

      const { error } = await supabaseClient.rpc('au_reject_signup_request', {
        p_request_id: selectedRequest.id,
        p_reviewed_by_employee_no: currentAdminEmployeeNo,
        p_reject_reason: reason
      });

      if (error) {
        console.error('au_reject_signup_request 오류:', error);
        throw new Error(`거절 처리 실패: ${error.message}`);
      }

      showMessage('success', '거절 처리 완료.');
      selectedRequest = null;
      rejectReasonEl.value = '';
      detailBox.style.display = 'none';
      detailEmpty.style.display = 'block';
      await loadPendingRequests();
    }

    document.getElementById('gofrontBtn').addEventListener('click', () => { location.href = 'front.html'; });
    document.getElementById('refreshBtn').addEventListener('click', async () => {
      try {
        if (currentRole === 'admin') await loadPendingRequests();
      } catch (error) {
        console.error(error);
        showMessage('error', error.message || '새로고침 중 오류가 발생했어.');
      }
    });

    approveBtn.addEventListener('click', async () => {
      try {
        approveBtn.disabled = true;
        rejectBtn.disabled = true;
        await approveSelectedRequest();
      } catch (error) {
        console.error(error);
        showMessage('error', error.message || '승인 처리 중 오류가 발생했어.');
      } finally {
        approveBtn.disabled = false;
        rejectBtn.disabled = false;
      }
    });

    rejectBtn.addEventListener('click', async () => {
      try {
        approveBtn.disabled = true;
        rejectBtn.disabled = true;
        await rejectSelectedRequest();
      } catch (error) {
        console.error(error);
        showMessage('error', error.message || '거절 처리 중 오류가 발생했어.');
      } finally {
        approveBtn.disabled = false;
        rejectBtn.disabled = false;
      }
    });

    supabaseClient.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') location.replace('index.html');
    });

    (async function init() {
      try {
        await ensureAdmin();
        if (currentRole === 'admin') await loadPendingRequests();
      } catch (error) {
        console.error(error);
        showMessage('error', error.message || '초기 로딩 중 오류가 발생했어.');
      }
    })();
  </script>
</body>
</html>
