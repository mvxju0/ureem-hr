<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사내 조직도</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f5f7fb;
      color: #111;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .title-area h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .title-area p {
      margin: 6px 0 0;
      color: #666;
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
    }

    .btn-primary {
      background: #111827;
      color: #fff;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111;
    }

    .btn-admin {
      background: #e6007e;
      color: #fff;
      display: none;
    }

    .panel {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 16px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      color: #555;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      height: 44px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 0 12px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: #111827;
    }

    .filter-actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .summary-left {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 13px;
      font-weight: 700;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .position-summary-title {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 800;
      color: #111827;
    }

    .position-summary-grid {
      display: grid;
      gap: 10px;
    }

    .position-row {
      display: grid;
      gap: 10px;
    }

    .position-row.row-6 {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .position-row.row-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .position-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 52px;
      padding: 14px 12px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .position-item .label {
      font-size: 14px;
      font-weight: 800;
      color: #111827;
    }

    .position-item .value {
      font-size: 15px;
      font-weight: 800;
      color: #e6007e;
    }

    .table-wrap {
      background: #fff;
      border-radius: 18px;
      overflow: auto;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .employee-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    .employee-table thead th {
      background: #111827;
      color: #fff;
      text-align: left;
      font-size: 13px;
      font-weight: 800;
      padding: 14px 16px;
      white-space: nowrap;
    }

    .employee-table tbody td {
      border-bottom: 1px solid #edf0f5;
      padding: 14px 16px;
      font-size: 14px;
      color: #111827;
      vertical-align: middle;
    }

    .employee-table tbody tr:hover {
      background: #f9fafb;
    }

    .employee-table tbody tr:last-child td {
      border-bottom: none;
    }

    .employee-table tbody tr.admin-row {
      cursor: pointer;
    }

    .employee-table tbody tr.admin-row:hover {
      background: #eef2ff;
    }

    .cell-name {
      font-weight: 700;
    }

    .cell-muted {
      color: #6b7280;
    }

    .phone-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .call-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: #e6007e;
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .empty,
    .loading,
    .error-box {
      background: #fff;
      border-radius: 18px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .empty p,
    .loading p,
    .error-box p {
      margin: 0;
      color: #666;
      line-height: 1.6;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1024px) {
      .filter-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .position-row.row-6 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .position-row.row-4 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 18px 12px 32px;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .position-row.row-6,
      .position-row.row-4 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .title-area h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-area">
        <h1>사내 조직도</h1>
        <p id="welcomeText">사용자 정보를 확인 중...</p>
      </div>

      <div class="top-actions">
        <button type="button" class="btn-admin" id="approveBtn">가입승인</button>
        <button type="button" class="btn-admin" id="storeEditBtn">매장편집</button>
        <button type="button" class="btn-secondary" id="refreshBtn">새로고침</button>
        <button type="button" class="btn-primary" id="logoutBtn">로그아웃</button>
      </div>
    </div>

    <div class="panel">
      <div class="filter-grid">
        <div class="field">
          <label for="searchInput">이름 / 사번 검색</label>
          <input type="text" id="searchInput" placeholder="이름 또는 사번 입력" />
        </div>

        <div class="field">
          <label for="storeFilter">매장</label>
          <select id="storeFilter">
            <option value="">전체</option>
          </select>
        </div>

        <div class="field">
          <label for="managerFilter">담당</label>
          <select id="managerFilter">
            <option value="">전체</option>
          </select>
        </div>

        <div class="field">
          <label for="teamLeaderFilter">팀장</label>
          <select id="teamLeaderFilter">
            <option value="">전체</option>
          </select>
        </div>

        <div class="field">
          <label for="positionFilter">직급</label>
          <select id="positionFilter">
            <option value="">전체</option>
          </select>
        </div>
      </div>

      <div class="filter-actions">
        <button type="button" class="btn-primary" id="searchBtn">검색</button>
        <button type="button" class="btn-secondary" id="resetBtn">초기화</button>
      </div>
    </div>

    <div class="panel summary">
      <div class="summary-left">
        <span class="badge" id="countBadge">총 0명</span>
        <span class="muted" id="roleText">권한 확인 중...</span>
      </div>
      <div class="muted" id="statusText">조직도 데이터를 불러오는 중...</div>
    </div>

    <div class="panel">
      <h2 class="position-summary-title">직급별 인원 현황</h2>

      <div class="position-summary-grid" id="positionSummaryGrid">
        <div class="position-row row-6">
          <div class="position-item" data-position="담당"><span class="label">담당</span><span class="value">-</span></div>
          <div class="position-item" data-position="팀장"><span class="label">팀장</span><span class="value">-</span></div>
          <div class="position-item" data-position="점장"><span class="label">점장</span><span class="value">-</span></div>
          <div class="position-item" data-position="SP2"><span class="label">SP2</span><span class="value">-</span></div>
          <div class="position-item" data-position="SP1.5"><span class="label">SP1.5</span><span class="value">-</span></div>
          <div class="position-item" data-position="SP1"><span class="label">SP1</span><span class="value">-</span></div>
        </div>

        <div class="position-row row-4">
          <div class="position-item" data-position="책임"><span class="label">책임</span><span class="value">-</span></div>
          <div class="position-item" data-position="선임"><span class="label">선임</span><span class="value">-</span></div>
          <div class="position-item" data-position="사원"><span class="label">사원</span><span class="value">-</span></div>
          <div class="position-item" data-position="CSM"><span class="label">CSM</span><span class="value">-</span></div>
        </div>
      </div>
    </div>

    <div id="loadingBox" class="loading">
      <p>데이터를 불러오는 중이야.</p>
    </div>

    <div id="errorBox" class="error-box hidden">
      <p id="errorMessage">오류가 발생했어.</p>
    </div>

    <div id="emptyBox" class="empty hidden">
      <p>조건에 맞는 직원 정보가 없다.</p>
    </div>

    <div id="tableWrap" class="table-wrap hidden">
      <table class="employee-table">
        <thead>
          <tr>
            <th>담당</th>
            <th>팀장</th>
            <th>매장</th>
            <th>직원명</th>
            <th>직급</th>
            <th>연락처</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ytnxmnbctujuopbqpurl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_4oBm89ecivuVF6StOBz7yg_qNBItC4z';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const COLUMN_MAP = {
      directory: {
        employeeNo: "employee_no",
        employeeName: "name",
        storeName: "store_name",
        managerName: "manager_name",
        teamLeaderName: "team_leader_name",
        positionName: "position_name",
        publicPhone: "public_phone",
        phone: "phone"
      },
      account: {
        employeeNo: "employee_no",
        authUserId: "auth_user_id",
        signupApproved: "signup_approved",
        accountStatus: "account_status"
      },
      employee: {
        employeeNo: "employee_no",
        systemRoleId: "system_role_id"
      },
      role: {
        id: "id",
        roleName: "role_name"
      }
    };

    const approveBtn = document.getElementById("approveBtn");
    const storeEditBtn = document.getElementById("storeEditBtn");
    const welcomeText = document.getElementById("welcomeText");
    const refreshBtn = document.getElementById("refreshBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const searchInput = document.getElementById("searchInput");
    const storeFilter = document.getElementById("storeFilter");
    const managerFilter = document.getElementById("managerFilter");
    const teamLeaderFilter = document.getElementById("teamLeaderFilter");
    const positionFilter = document.getElementById("positionFilter");
    const searchBtn = document.getElementById("searchBtn");
    const resetBtn = document.getElementById("resetBtn");

    const countBadge = document.getElementById("countBadge");
    const roleText = document.getElementById("roleText");
    const statusText = document.getElementById("statusText");

    const loadingBox = document.getElementById("loadingBox");
    const errorBox = document.getElementById("errorBox");
    const errorMessage = document.getElementById("errorMessage");
    const emptyBox = document.getElementById("emptyBox");
    const tableWrap = document.getElementById("tableWrap");
    const tableBody = document.getElementById("tableBody");
    const positionSummaryGrid = document.getElementById("positionSummaryGrid");

    let allRows = [];
    let filteredRows = [];
    let currentUser = null;
    let currentRole = "viewer";

    function setLoading(isLoading) {
      loadingBox.classList.toggle("hidden", !isLoading);
      if (isLoading) {
        errorBox.classList.add("hidden");
        emptyBox.classList.add("hidden");
        tableWrap.classList.add("hidden");
      }
    }

    function showError(message) {
      loadingBox.classList.add("hidden");
      tableWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      errorBox.classList.remove("hidden");
      errorMessage.textContent = message;
      statusText.textContent = "오류 발생";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function uniqueSortedValues(rows, key) {
      const values = rows
        .map(row => row[key])
        .filter(v => v !== null && v !== undefined && String(v).trim() !== "")
        .map(v => String(v).trim());

      return [...new Set(values)].sort((a, b) => a.localeCompare(b, "ko"));
    }

    function fillSelect(selectEl, values) {
      const current = selectEl.value;
      selectEl.innerHTML = `<option value="">전체</option>`;
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        selectEl.appendChild(option);
      });
      selectEl.value = values.includes(current) ? current : "";
    }

    function normalizeAccountStatus(status) {
      return String(status || "").toLowerCase().trim();
    }

    function goEdit(employeeNo) {
      if (currentRole !== "admin") return;
      location.href = `edit.html?employee_no=${encodeURIComponent(employeeNo)}`;
    }

    function buildPhoneCell(phoneValue) {
      const phoneText = String(phoneValue ?? "").trim();

      if (!phoneText) {
        return '<span>-</span>';
      }

      const phoneHref = phoneText.replace(/[^0-9+]/g, '');

      if (!phoneHref) {
        return `<span>${escapeHtml(phoneText)}</span>`;
      }

      return `
        <div class="phone-wrap">
          <span>${escapeHtml(phoneText)}</span>
          <a
            href="tel:${escapeHtml(phoneHref)}"
            class="call-btn"
            onclick="event.stopPropagation();"
          >통화</a>
        </div>
      `;
    }

    function buildTableRow(row) {
      const c = COLUMN_MAP.directory;

      const employeeNo = row[c.employeeNo] ?? "";
      const employeeName = row[c.employeeName] ?? "-";
      const storeName = row[c.storeName] ?? "-";
      const managerName = row[c.managerName] ?? "-";
      const teamLeaderName = row[c.teamLeaderName] ?? "-";
      const positionName = row[c.positionName] ?? "-";
      const phoneValue = row[c.publicPhone] ?? row[c.phone] ?? "";

      const trClass = currentRole === "admin" ? "admin-row" : "";
      const trClick = currentRole === "admin"
        ? `onclick="goEdit('${String(employeeNo).replaceAll("'", "\\'")}')"`
        : "";

      return `
        <tr class="${trClass}" ${trClick}>
          <td>${escapeHtml(managerName)}</td>
          <td>${escapeHtml(teamLeaderName)}</td>
          <td>${escapeHtml(storeName)}</td>
          <td class="cell-name">${escapeHtml(employeeName)}</td>
          <td>${escapeHtml(positionName)}</td>
          <td class="cell-muted">${buildPhoneCell(phoneValue)}</td>
        </tr>
      `;
    }

    function renderPositionSummary(rows) {
      const c = COLUMN_MAP.directory;
      const counts = {};

      rows.forEach(row => {
        const position = String(row[c.positionName] ?? "").trim();
        if (!position) return;
        counts[position] = (counts[position] || 0) + 1;
      });

      const items = positionSummaryGrid.querySelectorAll(".position-item");

      items.forEach(item => {
        const positionKey = item.dataset.position;
        const valueEl = item.querySelector(".value");
        const count = counts[positionKey] || 0;
        valueEl.textContent = count > 0 ? String(count) : "-";
      });
    }

    function renderList(rows) {
      loadingBox.classList.add("hidden");
      errorBox.classList.add("hidden");

      countBadge.textContent = `총 ${rows.length}명`;
      renderPositionSummary(rows);

      if (!rows.length) {
        tableWrap.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        statusText.textContent = "검색 결과 없음";
        tableBody.innerHTML = "";
        return;
      }

      emptyBox.classList.add("hidden");
      tableWrap.classList.remove("hidden");
      tableBody.innerHTML = rows.map(buildTableRow).join("");
      statusText.textContent = currentRole === "admin" ? "조회 완료 · 직원 클릭 시 수정 가능" : "조회 완료";
    }

    function applyFilters() {
      const c = COLUMN_MAP.directory;

      const keyword = searchInput.value.trim().toLowerCase();
      const store = storeFilter.value;
      const manager = managerFilter.value;
      const teamLeader = teamLeaderFilter.value;
      const position = positionFilter.value;

      filteredRows = allRows.filter(row => {
        const employeeName = String(row[c.employeeName] ?? "").toLowerCase();
        const employeeNo = String(row[c.employeeNo] ?? "").toLowerCase();
        const storeName = String(row[c.storeName] ?? "");
        const managerName = String(row[c.managerName] ?? "");
        const teamLeaderName = String(row[c.teamLeaderName] ?? "");
        const positionName = String(row[c.positionName] ?? "");

        const matchKeyword =
          !keyword ||
          employeeName.includes(keyword) ||
          employeeNo.includes(keyword);

        const matchStore = !store || storeName === store;
        const matchManager = !manager || managerName === manager;
        const matchTeamLeader = !teamLeader || teamLeaderName === teamLeader;
        const matchPosition = !position || positionName === position;

        return matchKeyword && matchStore && matchManager && matchTeamLeader && matchPosition;
      });

      renderList(filteredRows);
    }

    function resetFilters() {
      searchInput.value = "";
      storeFilter.value = "";
      managerFilter.value = "";
      teamLeaderFilter.value = "";
      positionFilter.value = "";
      filteredRows = [...allRows];
      renderList(filteredRows);
    }

    function setupFilterOptions(rows) {
      const c = COLUMN_MAP.directory;

      fillSelect(storeFilter, uniqueSortedValues(rows, c.storeName));
      fillSelect(managerFilter, uniqueSortedValues(rows, c.managerName));
      fillSelect(teamLeaderFilter, uniqueSortedValues(rows, c.teamLeaderName));
      fillSelect(positionFilter, uniqueSortedValues(rows, c.positionName));
    }

    async function ensureLoggedIn() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data?.user) {
        location.href = "index.html";
        return null;
      }

      currentUser = data.user;
      return data.user;
    }

    async function getMyAccount() {
      const a = COLUMN_MAP.account;

      const { data, error } = await supabaseClient
        .from("au_employee_accounts")
        .select(`
          ${a.employeeNo},
          ${a.authUserId},
          ${a.signupApproved},
          ${a.accountStatus}
        `)
        .eq(a.authUserId, currentUser.id)
        .maybeSingle();

      if (error) {
        console.error("au_employee_accounts 조회 오류:", error);
        throw new Error(`내 계정 정보를 불러오지 못했어. 상세 오류: ${error.message}`);
      }

      if (!data) {
        throw new Error("로그인된 계정의 직원 연결 정보가 없어.");
      }

      return data;
    }

    function validateAccount(account) {
      const approved = account.signup_approved;
      const status = normalizeAccountStatus(account.account_status);

      if (!approved) {
        throw new Error("아직 승인되지 않은 계정이야.");
      }

      if (status === "disabled") {
        throw new Error("비활성화된 계정이야.");
      }

      if (status === "locked") {
        throw new Error("잠긴 계정이야.");
      }
    }

    async function getMyEmployeeRole(employeeNo) {
      const e = COLUMN_MAP.employee;
      const r = COLUMN_MAP.role;

      const { data: employeeData, error: employeeError } = await supabaseClient
        .from("au_employees")
        .select(`
          ${e.employeeNo},
          ${e.systemRoleId}
        `)
        .eq(e.employeeNo, employeeNo)
        .maybeSingle();

      if (employeeError) {
        console.error("au_employees 조회 오류:", employeeError);
        throw new Error(`직원 정보를 불러오지 못했어. 상세 오류: ${employeeError.message}`);
      }

      if (!employeeData || !employeeData[e.systemRoleId]) {
        return "viewer";
      }

      const { data: roleData, error: roleError } = await supabaseClient
        .from("au_system_roles")
        .select(`
          ${r.id},
          ${r.roleName}
        `)
        .eq(r.id, employeeData[e.systemRoleId])
        .maybeSingle();

      if (roleError) {
        console.error("au_system_roles 조회 오류:", roleError);
        throw new Error(`권한 정보를 불러오지 못했어. 상세 오류: ${roleError.message}`);
      }

      return String(roleData?.[r.roleName] || "viewer").toLowerCase();
    }

    async function loadDirectory() {
      setLoading(true);

      const c = COLUMN_MAP.directory;

      const { data, error } = await supabaseClient
        .from("au_employee_directory_view")
        .select(`
          ${c.employeeNo},
          ${c.employeeName},
          ${c.storeName},
          ${c.managerName},
          ${c.teamLeaderName},
          ${c.positionName},
          ${c.publicPhone}
        `)
        .order(c.employeeName, { ascending: true });

      if (error) {
        console.error("au_employee_directory_view 조회 오류:", error);
        throw new Error(`조직도 데이터를 불러오지 못했어. 상세 오류: ${error.message}`);
      }

      allRows = Array.isArray(data) ? data : [];
      setupFilterOptions(allRows);
      filteredRows = [...allRows];
      renderList(filteredRows);
    }

    approveBtn.addEventListener("click", () => {
      location.href = "auth-requests.html";
    });

    storeEditBtn.addEventListener("click", () => {
      location.href = "store-edit.html";
    });

    searchBtn.addEventListener("click", applyFilters);
    resetBtn.addEventListener("click", resetFilters);

    refreshBtn.addEventListener("click", async () => {
      try {
        statusText.textContent = "새로고침 중...";
        await loadDirectory();
      } catch (err) {
        console.error(err);
        showError(err.message || "새로고침 중 오류가 발생했어.");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        const { error } = await supabaseClient.auth.signOut();

        if (error) {
          console.error("로그아웃 오류:", error);
          alert(`로그아웃 실패: ${error.message}`);
          return;
        }

        location.replace("index.html");
      } catch (err) {
        console.error("로그아웃 처리 예외:", err);
        alert(err.message || "로그아웃 중 오류가 발생했어.");
      }
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") applyFilters();
    });

    storeFilter.addEventListener("change", applyFilters);
    managerFilter.addEventListener("change", applyFilters);
    teamLeaderFilter.addEventListener("change", applyFilters);
    positionFilter.addEventListener("change", applyFilters);

    supabaseClient.auth.onAuthStateChange((event) => {
      if (event === "SIGNED_OUT") {
        location.replace("index.html");
      }
    });

    async function init() {
      try {
        statusText.textContent = "로그인 상태 확인 중...";
        await ensureLoggedIn();

        statusText.textContent = "조직도 조회 중...";
        await loadDirectory();

        const myAccount = await getMyAccount();
        validateAccount(myAccount);

        currentRole = await getMyEmployeeRole(myAccount.employee_no);

        welcomeText.textContent = `${myAccount.employee_no} 로그인됨`;
        roleText.textContent = `권한: ${currentRole}`;

        if (currentRole === "admin") {
          approveBtn.style.display = "inline-flex";
          storeEditBtn.style.display = "inline-flex";
        }

        renderList(filteredRows);
      } catch (err) {
        console.error(err);
        showError(err.message || "초기 로딩 중 오류가 발생했어.");
      }
    }

    init();
  </script>
</body>
</html>
