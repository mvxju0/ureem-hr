<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>운영 대시보드</title>
  
  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/nav.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />

</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-area">
        <h1>운영 대시보드</h1>
        <p id="welcomeText">사용자 정보를 확인 중...</p>
      </div>
      <div class="top-actions">
        <button type="button" class="btn-admin" id="approveBtn">가입승인</button>
        <button type="button" class="btn-admin" id="storeEditBtn">매장관리</button>
        <button type="button" class="btn-secondary" id="refreshBtn">새로고침</button>
        <button type="button" class="btn-primary" id="logoutBtn">로그아웃</button>
      </div>
    </div>

    <div class="panel dashboard-cards">
      <article class="metric-card"><div class="metric-label">총 직원 수</div><div class="metric-value" id="metricEmployees">0</div></article>
      <article class="metric-card"><div class="metric-label">조회 매장 수</div><div class="metric-value" id="metricStores">0</div></article>
      <article class="metric-card"><div class="metric-label">팀장 수</div><div class="metric-value" id="metricLeaders">0</div></article>
      <article class="metric-card"><div class="metric-label">현재 탭</div><div class="metric-value" id="metricTab">전체</div></article>
    </div>

    <div class="panel toolbar">
      <div class="field">
        <label for="searchInput">통합 검색 (이름/사번/팀장/매장)</label>
        <input id="searchInput" type="text" placeholder="예: 홍길동, 1012, 김팀장, 가경점" />
      </div>
      <div class="field">
        <label for="positionFilter">직급</label>
        <select id="positionFilter"><option value="">전체</option></select>
      </div>
    </div>

    <div class="panel summary">
      <div class="summary-left">
        <span class="badge" id="countBadge">총 0명</span>
        <span class="badge" id="leaderBadge">팀장 0명</span>
        <span class="muted" id="roleText">권한 확인 중...</span>
      </div>
      <span class="muted" id="statusText">조직도 데이터를 불러오는 중...</span>
    </div>

    <div class="panel">
      <div class="major-tab-header">
        <h2>조직도</h2>
        <span class="muted" id="majorGuideText">대분류 탭으로 팀별 구조를 빠르게 전환할 수 있어.</span>
      </div>
      <div class="tab-scroll" id="majorTabList"></div>
    </div>

    <div id="majorMissingNotice" class="notice-box hidden">
      담당(au_groups) 필터를 불러오는 중이야. 잠시 후 다시 시도해줘.
    </div>

    <div id="loadingBox" class="loading">데이터를 불러오는 중이야.</div>
    <div id="errorBox" class="error-box hidden"><span id="errorMessage">오류가 발생했어.</span></div>
    <div id="emptyBox" class="empty hidden">조건에 맞는 직원 정보가 없다.</div>

    <div id="leaderList" class="leader-list hidden"></div>
  </div>

  <nav class="bottom-nav" aria-label="하단 네비게이션">
    <a class="nav-item active" href="front.html"><span class="icon">🏠</span><span>대시보드</span></a>
    <a class="nav-item hidden" data-admin-only="true" href="employees.html"><span class="icon">👥</span><span>직원</span></a>
    <a class="nav-item hidden" data-admin-only="true" href="store-edit.html"><span class="icon">🏬</span><span>매장</span></a>
    <a class="nav-item" href="attendance.html"><span class="icon">🕒</span><span>근태</span></a>
    <a class="nav-item" href="payroll.html"><span class="icon">💳</span><span>급여</span></a>
  </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/auth-common.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
