<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>직원 정보 수정</title>
  
  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/edit.css" />

</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top-actions">
        <button type="button" class="submit-btn" id="saveBtnTop">수정완료</button>
        <button type="button" class="secondary-btn" id="cancelBtn">취소</button>
        <button type="button" class="home-btn" id="homeBtn">홈으로</button>
      </div>

      <h1>직원 정보 수정</h1>
      <p class="desc">
        관리자만 수정할 수 있다.
      </p>

      <form id="editForm">
        <div class="grid">
          <div class="field">
            <label for="employee_no">사번</label>
            <input type="text" id="employee_no" name="employee_no" readonly />
            <div class="row-note">사번은 현재 수정 제외</div>
          </div>

          <div class="field">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" required />
          </div>

          <div class="field">
            <label for="birth_date">생년월일</label>
            <input type="date" id="birth_date" name="birth_date" required />
          </div>

          <div class="field">
            <label for="hire_date">입사일</label>
            <input type="date" id="hire_date" name="hire_date" required />
          </div>

          <div class="field">
            <label for="phone">핸드폰번호</label>
            <input type="text" id="phone" name="phone" placeholder="01012345678" required />
          </div>

          <div class="field">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="field full">
            <label for="address">주소</label>
            <input type="text" id="address" name="address" required />
          </div>

          <div class="field">
            <label for="current_store_id">매장</label>
            <select id="current_store_id" name="current_store_id" required>
              <option value="">선택</option>
            </select>
          </div>

          <div class="field">
            <label for="current_manager_id">담당</label>
            <select id="current_manager_id" name="current_manager_id" required>
              <option value="">선택</option>
            </select>
          </div>

          <div class="field">
            <label for="current_team_leader_id">팀장</label>
            <select id="current_team_leader_id" name="current_team_leader_id" required>
              <option value="">선택</option>
            </select>
          </div>

          <div class="field">
            <label for="current_position_id">직급</label>
            <select id="current_position_id" name="current_position_id" required>
              <option value="">선택</option>
            </select>
          </div>

          <div class="field">
            <label for="employment_status">재직상태</label>
            <select id="employment_status" name="employment_status" required>
              <option value="">선택</option>
              <option value="재직">재직</option>
              <option value="퇴사">퇴사</option>
              <option value="휴직">휴직</option>
            </select>
          </div>

          <div class="field">
            <label for="system_role_id">시스템 권한</label>
            <select id="system_role_id" name="system_role_id" required>
              <option value="">선택</option>
            </select>
          </div>

          <div class="field">
            <label for="login_email">로그인 이메일</label>
            <input type="email" id="login_email" name="login_email" />
            <div class="row-note">주의: auth.users 이메일은 이 페이지에서 직접 변경되지 않음</div>
          </div>

          <div class="field">
            <label for="account_status">계정상태</label>
            <select id="account_status" name="account_status">
              <option value="">선택</option>
              <option value="active">active</option>
              <option value="locked">locked</option>
              <option value="disabled">disabled</option>
            </select>
          </div>

          <div class="field">
            <label for="signup_approved">가입 승인 여부</label>
            <select id="signup_approved" name="signup_approved">
              <option value="true">승인</option>
              <option value="false">미승인</option>
            </select>
          </div>

          <div class="field">
            <label for="is_active">사용 여부</label>
            <select id="is_active" name="is_active" required>
              <option value="true">활성</option>
              <option value="false">비활성</option>
            </select>
          </div>

          <div class="field">
            <label for="is_contact_public">연락처 공개 여부</label>
            <select id="is_contact_public" name="is_contact_public" required>
              <option value="true">공개</option>
              <option value="false">비공개</option>
            </select>
          </div>

          <div class="field full">
            <button type="submit" class="submit-btn" id="submitBtn">수정완료</button>
          </div>
        </div>
      </form>

      <div id="messageBox" class="msg"></div>
    </div>

    <div class="card">
      <h2 class="history-title">수정 히스토리</h2>
      <div class="history-box">
        <div class="history-list" id="historyList">
          <div class="history-item">
            <div class="history-label">안내</div>
            <div class="history-value">히스토리 정보를 불러오는 중...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/auth-common.js"></script>
  <script src="assets/js/edit.js"></script>
</body>
</html>
