<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>급여 관리</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; background: #f4f6fb; color: #111827; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px 14px 110px; }
    .panel { background: #fff; border: 1px solid #eaecf0; border-radius: 16px; padding: 16px; box-shadow: 0 4px 18px rgba(16,24,40,.04); }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p { margin: 0; color: #667085; line-height: 1.6; }
    .notice { margin-top: 12px; background: #eff8ff; border: 1px solid #b2ddff; color: #175cd3; border-radius: 12px; padding: 12px; font-size: 13px; }
    .bottom-nav { position: fixed; left:0; right:0; bottom:0; z-index:50; background:#fff; border-top:1px solid #e4e7ec; display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:6px; padding:8px 6px calc(8px + env(safe-area-inset-bottom)); }
    .nav-item { border-radius: 12px; min-height:52px; text-decoration:none; color:#667085; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:11px; font-weight:700; }
    .nav-item.active { background:#111827; color:#fff; }
    .icon { font-size:16px; line-height:1; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>급여 관리</h1>
      <p>급여 기능은 현재 준비 중이야. DB 확장 없이 운영 구조만 먼저 잡아두었어.</p>
      <div class="notice">가짜 급여 계산/샘플 금액은 넣지 않았고, 향후 급여 스키마와 정책 확정 뒤 실제 기능을 연결할 예정이야.</div>
    </section>
  </div>

  <nav class="bottom-nav" aria-label="하단 네비게이션">
    <a class="nav-item" href="front.html"><span class="icon">🏠</span><span>대시보드</span></a>
    <a class="nav-item hidden" data-admin-only="true" href="employees.html"><span class="icon">👥</span><span>직원</span></a>
    <a class="nav-item hidden" data-admin-only="true" href="store-edit.html"><span class="icon">🏬</span><span>매장</span></a>
    <a class="nav-item" href="attendance.html"><span class="icon">🕒</span><span>근태</span></a>
    <a class="nav-item active" href="payroll.html"><span class="icon">💳</span><span>급여</span></a>
  </nav>

  <script>
    const SUPABASE_URL = 'https://ytnxmnbctujuopbqpurl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_4oBm89ecivuVF6StOBz7yg_qNBItC4z';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function setAdminNavVisibility(roleName) {
      document.querySelectorAll('[data-admin-only="true"]').forEach((el)=>el.classList.toggle('hidden', roleName !== 'admin'));
    }

    async function init() {
      try {
        const { data, error } = await supabaseClient.auth.getUser();
        if (error || !data?.user) { location.replace('index.html'); return; }

        const user = data.user;
        const { data: account } = await supabaseClient
          .from('au_employee_accounts')
          .select('employee_no')
          .eq('auth_user_id', user.id)
          .maybeSingle();

        if (!account?.employee_no) { setAdminNavVisibility('viewer'); return; }

        const { data: employee } = await supabaseClient
          .from('au_employees')
          .select('system_role_id')
          .eq('employee_no', account.employee_no)
          .maybeSingle();

        const { data: role } = await supabaseClient
          .from('au_system_roles')
          .select('role_name')
          .eq('id', employee?.system_role_id)
          .maybeSingle();

        setAdminNavVisibility(String(role?.role_name || 'viewer').toLowerCase());
      } catch (err) {
        console.error(err);
      }
    }

    supabaseClient.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') location.replace('index.html');
    });

    init();
  </script>
</body>
</html>
